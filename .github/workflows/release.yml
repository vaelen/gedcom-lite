name: Release

# Publishes gedcom-lite to PyPI (on GitHub release) or TestPyPI (on manual dispatch).
#
# One-time setup outside the repo:
#   1. PyPI:     https://pypi.org/manage/account/publishing/
#                Add a "pending publisher" with:
#                  project name = gedcom-lite
#                  owner        = vaelen
#                  repository   = gedcom-lite
#                  workflow     = release.yml
#                  environment  = pypi
#   2. TestPyPI: https://test.pypi.org/manage/account/publishing/
#                Same settings, environment = testpypi.
#   3. GitHub:   Settings -> Environments -> create `pypi` and `testpypi`.
#                Restrict `pypi` to the `main` branch; optionally require a reviewer.
#
# After setup, publishing uses OIDC trusted publishing -- no API tokens stored.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/gedcom-lite
    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/gedcom-lite
    permissions:
      id-token: write

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
